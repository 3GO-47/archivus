<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVUS — The Codex</title>
<meta name="theme-color" content="#0a0c12">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0c12'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%23c9a227' stroke-width='1.6'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23e8c455'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@300;400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ARCHIVUS — v0.5 "Lens"
   Dark observatory. Modern instrument typography:
   Space Grotesk (structure) · Inter (reading) · IBM Plex Mono (data)
   ============================================================ */

:root {
  --obsidian:      #0a0c12;
  --obsidian-2:    #0e1119;
  --obsidian-3:    #131826;
  --paper:         #e6e1d3;
  --paper-dim:     #a8a494;
  --gold:          #c9a227;
  --gold-bright:   #e8c455;
  --gold-dim:      #6e5c1f;
  --indigo:        #7c9ac9;
  --line:          #262c3b;
  --line-faint:    #181d29;
  --panel-bg:      #10131dfa;
  --sans: "Inter", system-ui, sans-serif;
  --display: "Space Grotesk", system-ui, sans-serif;
  --mono: "IBM Plex Mono", Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body { height: 100dvh; }        /* dynamic viewport: tracks the phone's address bar */

body {
  background:
    radial-gradient(ellipse 130% 75% at 50% -12%, #151d33 0%, transparent 55%),
    radial-gradient(ellipse 85% 55% at 88% 112%, #1c1324 0%, transparent 60%),
    var(--obsidian);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mono { font-family: var(--mono); font-size: 0.82em; letter-spacing: 0.03em; }

/* ============ motion ============ */
@keyframes glowpulse {
  0%, 100% { box-shadow: 0 0 8px rgba(201,162,39,0.35); }
  50%      { box-shadow: 0 0 20px rgba(232,196,85,0.7); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes twinkle { 0%, 100% { opacity: 0.04; } 50% { opacity: 0.45; } }
@keyframes condense { from { transform: scale(0); } to { transform: scale(1); } }
@keyframes flow { to { stroke-dashoffset: -24; } }
@keyframes reveal-up {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0);   opacity: 1; }
}

/* ============ masthead ============ */
#masthead {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 22px 10px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(201,162,39,0.05), transparent);
  position: relative;
}
#masthead::after {
  content: "";
  position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 25%, var(--gold) 50%, var(--gold-dim) 75%, transparent);
  opacity: 0.5;
  pointer-events: none;
}

/* pure-geometry sigil: ring, orbit, nucleus */
.sigil {
  position: relative;
  width: 34px; height: 34px;
  border: 1px solid rgba(201,162,39,0.55);
  border-radius: 50%;
  animation: glowpulse 6s ease-in-out infinite;
}
.sigil::before {
  content: "";
  position: absolute; inset: -5px;
  border: 1px dashed rgba(201,162,39,0.3);
  border-radius: 50%;
  animation: spin 50s linear infinite;
}
.sigil::after {
  content: "";
  position: absolute; left: 50%; top: 50%;
  width: 6px; height: 6px; margin: -3px 0 0 -3px;
  background: var(--gold-bright);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gold-bright);
}

#masthead h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: 0.34em;
  color: var(--gold-bright);
}
.tagline {
  color: var(--paper-dim);
  font-size: 12px;
  letter-spacing: 0.06em;
  margin-top: 1px;
}

#tx-link {
  margin-left: auto;
  font-family: var(--display);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 7px 14px;
  transition: all 0.18s;
}
#tx-link:hover { color: var(--gold-bright); box-shadow: 0 0 12px rgba(201,162,39,0.22); }
#bl-link, #pn-link, #cx-link, #tr-link {
  margin-left: 8px;
  font-family: var(--display);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 7px 14px;
  transition: all 0.18s;
}
#bl-link:hover, #pn-link:hover, #cx-link:hover { color: var(--gold-bright); box-shadow: 0 0 12px rgba(201,162,39,0.22); }

.masthead-readout { margin-left: 16px; text-align: right; }
.readout-line { font-family: var(--display); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
.readout-line.mono { font-family: var(--mono); color: var(--paper-dim); font-size: 11px; margin-top: 3px; text-transform: none; }

/* ============ single command bar (main app) ============ */
#bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(201,162,39,0.05), transparent);
  position: relative;
  z-index: 30;
  flex-wrap: nowrap;
}
#bar::after {
  content: "";
  position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 25%, var(--gold) 50%, var(--gold-dim) 75%, transparent);
  opacity: 0.5;
  pointer-events: none;
}
#bar-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--gold-bright);
  margin-right: 4px;
}
.sigil.mini { width: 24px; height: 24px; }
.sigil.mini::before { inset: -4px; }
.sigil.mini::after { width: 5px; height: 5px; margin: -2.5px 0 0 -2.5px; }
#bar .masthead-readout { margin-left: 4px; }
#bar #search { flex: 0 1 220px; }
#bar #tx-link, #bar #bl-link, #bar #pn-link, #bar #cx-link, #bar #tr-link { margin-left: 0; padding: 6px 10px; font-size: 10.5px; }
#bar .sigil.mini { cursor: pointer; }

/* ============ the portal (welcome overlay) ============ */
#welcome {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(7, 9, 15, 0.93);
  display: flex; align-items: center; justify-content: center;
  padding: 18px;
  overflow-y: auto;
}
#welcome[hidden] { display: none !important; }   /* the hidden attribute must always win */
#welcome-card {
  width: min(680px, 96vw);
  max-height: 92dvh; overflow-y: auto;
  background: var(--obsidian-2);
  border: 1px solid var(--gold-dim);
  border-radius: 10px;
  padding: 30px 30px 22px;
  text-align: center;
  box-shadow: 0 30px 90px rgba(0,0,0,.7), 0 0 60px rgba(201,162,39,.08);
  animation: reveal-up 0.35s ease-out;
}
.w-sigil {
  width: 44px; height: 44px; margin: 0 auto 14px;
  border: 1px solid rgba(201,162,39,0.6); border-radius: 50%;
  position: relative; animation: glowpulse 5s ease-in-out infinite;
}
.w-sigil::after {
  content: ""; position: absolute; left: 50%; top: 50%;
  width: 8px; height: 8px; margin: -4px 0 0 -4px;
  background: var(--gold-bright); border-radius: 50%;
  box-shadow: 0 0 12px var(--gold-bright);
}
#welcome-card h2 {
  font-family: var(--display); font-weight: 700; font-size: 20px;
  letter-spacing: 0.34em; color: var(--gold-bright); margin-bottom: 8px;
}
.w-sub { font-size: 13.5px; line-height: 1.6; color: var(--paper-dim); margin-bottom: 20px; }
.w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.w-door {
  display: flex; flex-direction: column; gap: 4px; align-items: flex-start; text-align: left;
  background: var(--obsidian-3); border: 1px solid var(--line); border-radius: 7px;
  padding: 13px 15px; cursor: pointer; text-decoration: none;
  color: var(--paper); font-family: var(--sans); transition: all 0.16s;
}
.w-door:hover { border-color: var(--gold); background: rgba(201,162,39,0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.w-door.wide { grid-column: 1 / -1; }
.w-door .w-ic { font-size: 19px; }
.w-door b { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--gold-bright); letter-spacing: 0.03em; }
.w-door span:last-child { font-size: 11.5px; line-height: 1.5; color: var(--paper-dim); }
.w-foot { margin-top: 16px; font-family: var(--mono); font-size: 10px; color: #59617c; }
.w-foot b { color: var(--gold); font-weight: 400; }
@media (max-width: 700px) {
  .w-grid { grid-template-columns: 1fr; }
  #welcome-card { padding: 22px 18px 16px; }
  #welcome-card h2 { font-size: 16px; letter-spacing: 0.24em; }
}

/* ============ collapsible drawer ============ */
#drawer {
  position: fixed;
  left: 0; top: 48px; bottom: 0;
  width: 300px;
  max-width: 85vw;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border-right: 1px solid var(--line);
  box-shadow: 24px 0 60px rgba(0,0,0,0.5);
  padding: 18px 16px 30px;
  overflow-y: auto;
  z-index: 25;
  transform: translateX(-104%);
  transition: transform 0.3s cubic-bezier(.22,1,.36,1);
}
#drawer.open { transform: translateX(0); }
.d-section { margin-bottom: 20px; }
.d-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 9px;
}
.d-row { display: flex; flex-wrap: wrap; gap: 6px; }
.d-row select { max-width: 100%; flex: 1 1 120px; }
#drawer #theme-chips { display: flex; flex-direction: column; gap: 6px; padding: 0; border: none; }
#drawer .chip { justify-content: flex-start; }
.d-legend { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--paper-dim); }
.d-legend .legend-item { display: inline-flex; align-items: center; gap: 7px; line-height: 1.5; }

/* atlas time-play + narrative tours */
#play-btn {
  position: absolute;
  left: 10px; bottom: 46px;
  z-index: 6;
  box-shadow: 0 4px 18px rgba(0,0,0,0.5), 0 0 14px rgba(201,162,39,0.15);
}
#tours-menu {
  position: absolute;
  right: 12px; top: 8px;
  z-index: 40;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 10px;
  width: 340px;
  max-width: 90vw;
  box-shadow: 0 14px 44px rgba(0,0,0,0.6);
}
.tour-item {
  padding: 9px 10px;
  border-left: 2px solid var(--gold-dim);
  background: rgba(255,255,255,0.02);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tour-item:hover { background: rgba(201,162,39,0.1); border-left-color: var(--gold); }
.tour-item .tt { font-family: var(--display); font-weight: 600; font-size: 12.5px; color: var(--gold-bright); }
.tour-item .tb { font-size: 11.5px; color: var(--paper-dim); margin-top: 2px; line-height: 1.45; }
#tour-card {
  position: absolute;
  left: 50%; bottom: 52px;
  transform: translateX(-50%);
  z-index: 35;
  width: 560px; max-width: 92%;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 14px 16px 12px;
  box-shadow: 0 16px 50px rgba(0,0,0,0.65), 0 0 24px rgba(201,162,39,0.1);
  animation: reveal-up 0.25s ease-out;
}
#tour-note { font-size: 14px; line-height: 1.6; color: var(--paper); margin: 6px 0 10px; }
#tour-nav { display: flex; align-items: center; gap: 8px; }
#tour-step { font-size: 10.5px; color: #59617c; margin: 0 auto 0 4px; }
.map-year-big {
  font-family: "IBM Plex Mono", monospace;
  fill: var(--gold-bright);
  font-size: 34px;
  letter-spacing: 0.06em;
  paint-order: stroke; stroke: rgba(10,12,18,0.85); stroke-width: 6px;
}
.ignite { pointer-events: none; }
#play-speed { position: absolute; left: 150px; bottom: 46px; z-index: 6; }
#play-era {
  position: absolute; left: 10px; bottom: 88px; z-index: 6;
  font-family: var(--display); font-weight: 700;
  font-size: 21px; letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--gold-bright);
  text-shadow: 0 0 18px rgba(201,162,39,0.5), 0 2px 4px rgba(0,0,0,0.8);
  pointer-events: none;
}
#play-era.flash { animation: era-flash 0.9s ease-out; }
@keyframes era-flash {
  0% { transform: scale(1.5); opacity: 0; letter-spacing: 0.5em; }
  100% { transform: scale(1); opacity: 1; letter-spacing: 0.24em; }
}
#play-feed {
  position: absolute; left: 10px; top: 46px; z-index: 6;
  width: 320px; max-width: 44vw;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
.feed-item {
  background: rgba(10,12,18,0.72);
  border-left: 3px solid var(--c, var(--gold));
  border-radius: 0 3px 3px 0;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--paper);
  animation: reveal-up 0.3s ease-out;
}
.feed-item .fy { font-family: var(--mono); font-size: 9.5px; color: var(--gold-bright); display: block; }
.feed-item:nth-child(n+4) { opacity: 0.55; }
.feed-item:nth-child(n+6) { opacity: 0.28; }
.wheel-hand { stroke: var(--gold-bright); stroke-width: 1.6; filter: drop-shadow(0 0 8px rgba(232,196,85,0.8)); pointer-events: none; }
.wheel-hand-tip { fill: var(--gold-bright); filter: drop-shadow(0 0 10px rgba(232,196,85,0.9)); pointer-events: none; }
.wheel-year-big {
  font-family: "IBM Plex Mono", monospace;
  fill: var(--gold-bright); font-size: 22px;
  paint-order: stroke; stroke: rgba(10,12,18,0.85); stroke-width: 5px;
}

/* floating status chip inside the chart */
#status {
  position: absolute;
  right: 10px; bottom: 8px;
  font-size: 10.5px;
  color: #59617c;
  background: rgba(10,12,18,0.55);
  border: 1px solid var(--line-faint);
  border-radius: 3px;
  padding: 3px 9px;
  pointer-events: none;
  z-index: 5;
}

/* ============ toolbar ============ */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 22px;
  border-bottom: 1px solid var(--line-faint);
}

#view-switch {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
.view-btn {
  background: var(--obsidian-3);
  border: none;
  border-right: 1px solid var(--line);
  color: var(--paper-dim);
  font-family: var(--display);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.view-btn:last-child { border-right: none; }
.view-btn:hover { color: var(--gold-bright); }
.view-btn.active {
  background: rgba(201,162,39,0.15);
  color: var(--gold-bright);
  box-shadow: inset 0 -2px 0 var(--gold);
}

#search {
  flex: 0 1 280px;
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
#search:focus { border-color: var(--gold-dim); box-shadow: 0 0 12px rgba(201,162,39,0.2); }
#search::placeholder { color: #5c637a; }

select {
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 12.5px;
  padding: 8px 8px;
  border-radius: 4px;
  max-width: 170px;
  transition: border-color 0.18s;
}
select:hover, select:focus { border-color: var(--gold-dim); outline: none; }

.toolbar-spacer { flex: 1; }

.tool-btn {
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper-dim);
  font-family: var(--display);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  min-width: 34px;
  transition: all 0.18s;
}
.tool-btn:hover {
  border-color: var(--gold-dim);
  color: var(--gold-bright);
  box-shadow: 0 0 10px rgba(201,162,39,0.16);
}
.tool-btn.accent { border-color: var(--gold-dim); color: var(--gold); }
.tool-btn.wide { padding: 8px 14px; }

/* ============ theme chips ============ */
#theme-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 22px 9px;
  border-bottom: 1px solid var(--line-faint);
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.02em;
  color: var(--paper-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 4px 11px;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
}
.chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c, var(--gold));
  box-shadow: 0 0 7px var(--c, var(--gold));
}
.chip:hover { border-color: var(--gold-dim); color: var(--paper); }
.chip.active {
  border-color: var(--c, var(--gold));
  color: var(--paper);
  background: color-mix(in srgb, var(--c, var(--gold)) 14%, transparent);
}
.chip.dimmed { opacity: 0.35; }

/* ============ stage ============ */
#stage { flex: 1; display: flex; min-height: 0; position: relative; }

#chart-wrap { flex: 1; position: relative; min-width: 0; }

#chart {
  width: 100%; height: 100%; display: block;
  cursor: crosshair;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
#chart.panning { cursor: grabbing; }

/* --- SVG vocabulary --- */
.era-band { cursor: pointer; transition: filter 0.18s; }
.era-band:hover { filter: brightness(1.8); }
.era-band-label {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-weight: 500;
  fill: #8f9ab5;
  letter-spacing: 0.12em;
  pointer-events: none;
  text-transform: uppercase;
}
.era-boundary { stroke: var(--line-faint); stroke-width: 1; }
.axis-tick-label { font-family: "IBM Plex Mono", monospace; fill: #66708c; font-size: 10px; }
.axis-line { stroke: var(--line); }
.meridian { stroke: var(--gold-dim); stroke-width: 1; stroke-dasharray: 3 4; }
.meridian-label { font-family: "Space Grotesk", sans-serif; fill: var(--gold-dim); font-size: 9px; letter-spacing: 0.16em; }
.lane-label {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-weight: 500;
  fill: #4d5670;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  pointer-events: none;
}
.lane-line { stroke: var(--line-faint); stroke-dasharray: 1 5; }

.evt { cursor: pointer; }
.evt .node-core { transition: r 0.16s cubic-bezier(.34,1.56,.64,1); }
.evt-label {
  font-family: "Inter", system-ui, sans-serif;
  fill: var(--paper-dim);
  font-size: 10.5px;
  letter-spacing: 0.01em;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(10,12,18,0.88);
  stroke-width: 3px;
}
.evt-label.major { fill: var(--paper); font-size: 11.5px; font-weight: 500; }

.enter .evt {
  transform-box: fill-box;
  transform-origin: center;
  animation: condense 0.5s cubic-bezier(.34,1.56,.64,1) both;
}

/* the standing web of relations */
.web-line {
  stroke: var(--gold);
  stroke-width: 0.6;
  opacity: 0.10;
  pointer-events: none;
}
/* the ignited thread */
.constellation {
  stroke: var(--gold-bright);
  stroke-width: 1;
  stroke-dasharray: 3 5;
  opacity: 0.8;
  pointer-events: none;
  animation: flow 1.6s linear infinite;
}

.star { fill: #b8c4e8; pointer-events: none; }
.star.twinkle { animation-name: twinkle; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }

.time-cursor { stroke: rgba(232,196,85,0.3); stroke-width: 1; pointer-events: none; }
.time-cursor-label {

    claimSource: "Ramanujan, per Hardy and family testimony", claimYear: 1913, claimDate: "1913–1920",
    quote: "An equation for me has no meaning unless it expresses a thought of God.",
    record: { innovation: "Partition asymptotics, mock theta functions, 3,900 results", year: 1918, date: "1913–1920; mock theta functions vindicated in full only after 2002",
      place: "Kumbakonam → Cambridge",
      principles: "Formally: extreme pattern-recognition over self-built notational systems, later proved by standard methods. The transmission claim and the mathematics are both simply *there* — the archive holds the tension rather than resolving it." },
    note: "The strongest modern case where the claimed channel cannot be separated from the results' texture.",
    eventRefs: ["quantum"],
    links: { claim: "https://en.wikipedia.org/wiki/Srinivasa_Ramanujan", record: "https://en.wikipedia.org/wiki/Mock_modular_form" } },

  { id: "loewi-frogs", category: "oneiric", transmitter: "A dream, twice — the second time he got up",
    taught: "Loewi dreamed the experimental design proving nerves signal chemically; scribbled it, couldn't read it, and the dream mercifully returned the next night",
    claimSource: "Loewi's autobiographical sketch", claimYear: 1921, claimDate: "Easter 1921",
    quote: "I got up immediately, went to the laboratory, and performed a simple experiment on a frog heart.",
    record: { innovation: "Chemical neurotransmission (acetylcholine)", year: 1921, date: "1921; Nobel Prize 1936",
      place: "Graz",
      principles: "Perfusate from a stimulated vagus slows a second heart with no nerve attached — the signal must be a molecule. Foundation of neuropharmacology." },
    note: "The rare dream-claim validated in the laboratory within hours of waking.",
    eventRefs: ["germtheory", "dna"],
    links: { claim: "https://en.wikipedia.org/wiki/Otto_Loewi", record: "https://en.wikipedia.org/wiki/Acetylcholine#History" } }
];

</script>
  <script>
/* ============================================================
   ARCHIVUS — THE CODEX
   The archive as an open book. Every record, in chronological
   order, paginated onto parchment spreads; each era opens a
   chapter with its own heading; a winding gilt river runs down
   the margin of every page, one bend per entry, so the eye can
   follow time even while reading.

   Causation is first-class: every entry lists its threads —
   both what it grew from (⟵) and what grew from it (⟶),
   computed from the relation web in both directions. Clicking
   a thread flips the book to that record and lights it.
   Records touched by the Transmissions carry a ☿ thread into
   the codex of claims. Anticipated records carry the spectral
   HORIZON badge. Deep links: codex.html#e=<id>.
   ============================================================ */
(function () {
  "use strict";
  const EV = (window.ARCHIVUS_EVENTS || []).slice();
  const ERAS = window.ARCHIVUS_ERAS || [];
  const THEMES = window.ARCHIVUS_THEMES || [];
  const TX = window.ARCHIVUS_TRANSMISSIONS || [];
  const THEME_META = Object.fromEntries(THEMES.map(t => [t.id, t]));
  const BY_ID = Object.fromEntries(EV.map(e => [e.id, e]));
  const fmtY = y => y == null ? "" : (y < 0 ? Math.abs(y).toLocaleString() + " BCE" : y + " CE");

  /* reverse relation index: what cites me as an ancestor */
  const REV = {};
  EV.forEach(e => (e.related || []).forEach(r => (REV[r] = REV[r] || []).push(e.id)));
  /* transmissions touching each event */
  const TXBY = {};
  TX.forEach(t => (t.eventRefs || []).forEach(id => (TXBY[id] = TXBY[id] || []).push(t)));

  /* ---- the manuscript: chronological flow with chapter breaks ---- */
  EV.sort((a, b) => (a.startYear - b.startYear) || (b.importance - a.importance));
  const eraOfYear = y => ERAS.find(er => y >= er.start && y < er.end) || ERAS[ERAS.length - 1];
  /* filters: the codex re-binds itself around whatever you ask of it */
  const FILT = { era: "", theme: "", region: "" };
  const visible = e =>
    (!FILT.era || eraOfYear(e.startYear).id === FILT.era) &&
    (!FILT.theme || e.theme === FILT.theme) &&
    (!FILT.region || e.region === FILT.region);
  let flow = [];
  function buildFlow() {
    flow = [];
    let curEra = null;
    EV.forEach(e => {
      if (!visible(e)) return;
      const er = eraOfYear(e.startYear);
      if (er !== curEra) { curEra = er; flow.push({ kind: "era", era: er }); }
      flow.push({ kind: "ev", e });
    });
  }

  /* ---- pagination by estimated height ---- */
  const PAGE_H = () => Math.max(380, document.querySelector(".cx-page-inner").clientHeight || 560);
  const CHARS_PER_LINE = 74;
  function heightOf(item) {
    if (item.kind === "era") return 118 + Math.ceil((item.era.blurb || "").length / 80) * 18;
    const e = item.e;
    let h = 46;                                              /* when + title + meta */
    h += Math.ceil((e.desc || "").length / CHARS_PER_LINE) * 20;
    const nrel = Math.min(5, (e.related || []).length + (REV[e.id] || []).length) + (TXBY[e.id] ? 1 : 0);
    if (nrel) h += 16 + Math.ceil(nrel / 2.6) * 17;
    return h;
  }
  let pages = [];
  function paginate() {
    pages = [];
    const H = PAGE_H();
    let cur = [], used = 0;
    flow.forEach(item => {
      const h = heightOf(item);
      if (used + h > H && cur.length) { pages.push(cur); cur = []; used = 0; }
      cur.push(item); used += h;
    });
    if (cur.length) pages.push(cur);
  }

  /* ---- rendering a spread ---- */
  const book = document.getElementById("cx-book");
  const pageEls = [...book.querySelectorAll(".cx-page")];
  const narrow = () => window.matchMedia ? window.matchMedia("(max-width: 760px)").matches : false;
  let spread = 0;                                            /* index of left page */
  let litId = null;

  function evHTML(e) {
    const t = THEME_META[e.theme] || { color: "#a8862a", name: e.theme };
    const when = fmtY(e.startYear) + (e.endYear ? " — " + fmtY(e.endYear) : "") + (e.approximate ? "  (c.)" : "");
    const stars = "◆".repeat(Math.max(1, Math.round((e.importance || 5) / 2.5)));
    /* threads: ancestors it names (⟵ if earlier), and records that name it (⟶) */
    const fwd = (e.related || []).map(r => BY_ID[r]).filter(Boolean);
    const back = (REV[e.id] || []).map(r => BY_ID[r]).filter(o => !fwd.includes(o));
    const seen = new Set();
    const threads = fwd.concat(back).filter(o => !seen.has(o.id) && seen.add(o.id)).slice(0, 5)
      .map(o => '<a data-go="' + o.id + '">' + (o.startYear < e.startYear ? "⟵ " : "⟶ ") +
        (o.title.length > 30 ? o.title.slice(0, 29) + "…" : o.title) + "</a>").join("");
    const txs = (TXBY[e.id] || []).slice(0, 2)
      .map(t2 => '<a class="tx" href="transmissions.html#' + t2.id + '">☿ ' + t2.transmitter.split(",")[0] + "</a>").join("");
    return '<div class="cx-ev" id="cx-' + e.id + '">' +
      '<div class="cx-links"><a href="index.html#e=' + e.id + '&v=chronicle" title="Open in the Chronicle">chronicle ⟶</a>' +
      (e.source ? '<a href="' + e.source + '" target="_blank" rel="noopener" title="Consult source">source ↗</a>' : "") + "</div>" +
      '<div class="cx-when">' + when + ' <span class="imp">' + stars + "</span></div>" +
      '<div class="cx-title">' + e.title + (e.future ? '<span class="fut">HORIZON</span>' : "") + "</div>" +
      '<div class="cx-blurb">' + (e.desc || "") + "</div>" +
      '<div class="cx-meta"><span class="dot" style="background:' + t.color + '"></span>' + (t.name || "") +
      " · " + (e.region || "") + (e.civ ? " · " + e.civ : "") + "</div>" +
      (threads || txs ? '<div class="cx-threads"><b>THREADS </b>' + threads + txs + "</div>" : "") +
      "</div>";
  }
  function eraHTML(er) {
    return '<div class="cx-era"><div class="rule"></div><div class="nm">' + er.name + "</div>" +
      '<div class="span">' + fmtY(er.start) + " — " + fmtY(er.end) + "</div>" +
      '<div class="blurb">' + (er.blurb || "") + '</div><div class="rule"></div></div>';
  }

  /* the winding river: one bend per entry, drawn through the margin */
  function drawRiver(svg, pageDiv) {
    svg.innerHTML = "";
    const NS = "http://www.w3.org/2000/svg";
    const H = pageDiv.clientHeight || 600;
    svg.setAttribute("viewBox", "0 0 56 " + H);
    const inner = pageDiv.querySelector(".cx-page-inner");
    const anchors = [...inner.children].map((el2, i) => ({
      y: 30 + el2.offsetTop + 16,
      x: 28 + (i % 2 ? 9 : -9),
      era: el2.classList.contains("cx-era"),
      color: el2.dataset.color || "#a8862a",
      future: el2.dataset.future === "1"
    }));
    if (!anchors.length) return;
    let d = `M 28 0 C 28 ${anchors[0].y * 0.5}, ${anchors[0].x} ${anchors[0].y * 0.6}, ${anchors[0].x} ${anchors[0].y}`;
    for (let i = 1; i < anchors.length; i++) {
      const a = anchors[i - 1], b = anchors[i];
      const my = (a.y + b.y) / 2;
      d += ` C ${a.x} ${my}, ${b.x} ${my}, ${b.x} ${b.y}`;
    }
    d += ` C ${anchors[anchors.length - 1].x} ${H - 20}, 28 ${H - 14}, 28 ${H}`;
    const p = document.createElementNS(NS, "path");
    p.setAttribute("d", d);
    svg.appendChild(p);
    anchors.forEach(a => {
      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", a.x); c.setAttribute("cy", a.y);
      c.setAttribute("r", a.era ? 5 : 3.4);
      c.setAttribute("fill", a.era ? "none" : a.color);
      c.setAttribute("stroke", a.future ? "#4a6a8a" : "#a8862a");
      c.setAttribute("stroke-width", a.era ? 1.6 : (a.future ? 1.4 : 0.8));
      if (a.future) c.setAttribute("stroke-dasharray", "1.5 2");
      svg.appendChild(c);
    });
    /* a small arrowhead at the foot: time flows downward */
    const ar = document.createElementNS(NS, "path");
    ar.setAttribute("class", "arrow");
    ar.setAttribute("d", `M 24 ${H - 10} L 28 ${H - 2} L 32 ${H - 10} Z`);
    svg.appendChild(ar);
  }

  function renderPage(pgEl, pageIdx, dir) {
    const inner = pgEl.querySelector(".cx-page-inner");
    const folio = pgEl.querySelector(".cx-folio");
    const items = pages[pageIdx] || [];
    inner.innerHTML = items.map(it => it.kind === "era" ? eraHTML(it.era) : evHTML(it.e)).join("");
    /* stamp data for the river */
    let k = 0;
    items.forEach(it => {
      const el2 = inner.children[k++];
      if (it.kind === "ev") {
        el2.dataset.color = (THEME_META[it.e.theme] || {}).color || "#a8862a";
        if (it.e.future) el2.dataset.future = "1";
      }
    });
    folio.textContent = pages[pageIdx] ? "FOLIO " + (pageIdx + 1) + " · " + pages.length : "";
    drawRiver(pgEl.querySelector(".cx-river"), pgEl);
    if (litId) { const hit = inner.querySelector('[id="cx-' + litId + '"]'); if (hit) hit.classList.add("lit"); }
    pgEl.classList.remove("turning-f", "turning-b");
    void pgEl.offsetWidth;
    if (dir) pgEl.classList.add(dir > 0 ? "turning-f" : "turning-b");
    inner.querySelectorAll("a[data-go]").forEach(a =>
      a.addEventListener("click", ev => { ev.preventDefault(); goTo(a.dataset.go); }));
  }

  function eraAt(pageIdx) {
    for (let i = pageIdx; i >= 0; i--) {
      const withEra = (pages[i] || []).slice().reverse().find(it => it.kind === "era" || it.kind === "ev");
      if (withEra) return withEra.kind === "era" ? withEra.era : eraOfYear(withEra.e.startYear);
    }
    return ERAS[0];
  }
  function render(dir) {
    const per = narrow() ? 1 : 2;
    spread = Math.max(0, Math.min(spread, Math.max(0, pages.length - per)));
    renderPage(pageEls[0], spread, dir);
    if (!narrow()) renderPage(pageEls[1], spread + 1, dir);
    const er = eraAt(spread);
    const nEv = flow.reduce((s, it) => s + (it.kind === "ev" ? 1 : 0), 0);
    document.getElementById("cx-era-now").textContent = er ? er.name : "—";
    document.getElementById("cx-folio-now").textContent = "folio " + (spread + 1) + (narrow() ? "" : "–" + Math.min(spread + 2, pages.length)) + " of " + Math.max(1, pages.length) + " · " + nEv + " records";
  }
  function flip(d) { spread += d * (narrow() ? 1 : 2); render(d); }

  function goTo(id) {
    let idx = pages.findIndex(pg => pg.some(it => it.kind === "ev" && it.e.id === id));
    if (idx < 0 && (FILT.era || FILT.theme || FILT.region)) {
      /* the record is filtered out — the codex opens itself back up to reach it */
      FILT.era = FILT.theme = FILT.region = "";
      ["cx-era", "cx-theme", "cx-region"].forEach(i2 => { const s2 = document.getElementById(i2); if (s2) s2.value = ""; });
      buildFlow(); paginate(); buildTOC();
      idx = pages.findIndex(pg => pg.some(it => it.kind === "ev" && it.e.id === id));
    }
    if (idx < 0) return;
    litId = id;
    const per = narrow() ? 1 : 2;
    spread = Math.floor(idx / per) * per;
    render(0);
  }

  /* ---- table of contents ---- */
  const toc = document.getElementById("cx-toc");
  function buildTOC() {
    const rows = [];
    pages.forEach((pg, i) => pg.forEach(it => { if (it.kind === "era") rows.push([it.era, i]); }));
    toc.innerHTML = '<div class="kicker">THE CODEX · TABLE OF CONTENTS · ' + EV.length + " RECORDS</div>" +
      rows.map(([er, i]) => '<a data-pg="' + i + '">' + er.name +
        '<span class="fol">' + fmtY(er.start) + " — " + fmtY(er.end) + " · folio " + (i + 1) + "</span></a>").join("");
    toc.querySelectorAll("a").forEach(a => a.addEventListener("click", () => {
      const per = narrow() ? 1 : 2;
      spread = Math.floor((+a.dataset.pg) / per) * per;
      toc.hidden = true;
      render(1);
    }));
  }
  document.getElementById("cx-toc-btn").addEventListener("click", () => { toc.hidden = !toc.hidden; });

  /* ---- controls ---- */
  document.getElementById("cx-prev").addEventListener("click", () => flip(-1));
  document.getElementById("cx-next").addEventListener("click", () => flip(1));
  document.getElementById("cx-first").addEventListener("click", () => { spread = 0; render(-1); });
  document.getElementById("cx-last").addEventListener("click", () => { spread = pages.length; render(1); });
  book.querySelector(".cx-corner.prev").addEventListener("click", () => flip(-1));
  book.querySelector(".cx-corner.next").addEventListener("click", () => flip(1));
  window.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft" || e.key === "PageUp") flip(-1);
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); flip(1); }
    if (e.key === "Home") { spread = 0; render(-1); }
    if (e.key === "End") { spread = pages.length; render(1); }
    if (e.key === "Escape") toc.hidden = true;
  });
  const search = document.getElementById("cx-search");
  search.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const q = search.value.trim().toLowerCase();
    if (!q) return;
    const hit = EV.find(x => visible(x) && x.title.toLowerCase().includes(q)) ||
      EV.find(x => visible(x) && (x.desc || "").toLowerCase().includes(q)) ||
      EV.find(x => x.title.toLowerCase().includes(q));
    if (hit) goTo(hit.id);
  });

  /* ---- filters ---- */
  const selEra = document.getElementById("cx-era");
  const selTheme = document.getElementById("cx-theme");
  const selRegion = document.getElementById("cx-region");
  if (selEra) {
    ERAS.forEach(er => { const o = document.createElement("option"); o.value = er.id; o.textContent = er.name; selEra.appendChild(o); });
    THEMES.forEach(t => { const o = document.createElement("option"); o.value = t.id; o.textContent = t.name; selTheme.appendChild(o); });
    (window.ARCHIVUS_REGIONS || []).forEach(r => { const o = document.createElement("option"); o.value = r; o.textContent = r; selRegion.appendChild(o); });
    [selEra, selTheme, selRegion].forEach(s2 => s2.addEventListener("change", () => {
      FILT.era = selEra.value; FILT.theme = selTheme.value; FILT.region = selRegion.value;
      litId = null; spread = 0;
      buildFlow(); paginate(); buildTOC(); render(1);
    }));
  }
  /* touch: swipe across the book to turn pages */
  let swipe = null;
  book.addEventListener("pointerdown", e => { if (e.target.closest("a")) return; swipe = { x: e.clientX, y: e.clientY, t: Date.now() }; });
  book.addEventListener("pointerup", e => {
    if (!swipe) return;
    const dx = e.clientX - swipe.x, dy = e.clientY - swipe.y;
    if (Date.now() - swipe.t < 650 && Math.abs(dx) > 48 && Math.abs(dx) > Math.abs(dy) * 1.5) flip(dx < 0 ? 1 : -1);
    swipe = null;
  });

  /* wheel over the book turns pages */
  let wheelLock = 0;
  book.addEventListener("wheel", e => {
    e.preventDefault();
    const now = Date.now();
    if (now - wheelLock < 260) return;
    wheelLock = now;
    flip(e.deltaY > 0 ? 1 : -1);
  }, { passive: false });

  /* ---- boot ---- */
  function boot() {
    buildFlow();
    paginate();
    buildTOC();
    const m = location.hash.match(/e=([\w-]+)/);
    if (m && BY_ID[m[1]]) goTo(m[1]); else render(1);
  }
  window.addEventListener("hashchange", () => {
    const m = location.hash.match(/e=([\w-]+)/);
    if (m && BY_ID[m[1]]) goTo(m[1]);
  });
  let rsz = null;
  window.addEventListener("resize", () => { clearTimeout(rsz); rsz = setTimeout(() => { buildFlow(); paginate(); buildTOC(); render(0); }, 200); });
  boot();
})();

</script>
