<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVUS — The Trial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ARCHIVUS — v0.5 "Lens"
   Dark observatory. Modern instrument typography:
   Space Grotesk (structure) · Inter (reading) · IBM Plex Mono (data)
   ============================================================ */

:root {
  --obsidian:      #0a0c12;
  --obsidian-2:    #0e1119;
  --obsidian-3:    #131826;
  --paper:         #e6e1d3;
  --paper-dim:     #a8a494;
  --gold:          #c9a227;
  --gold-bright:   #e8c455;
  --gold-dim:      #6e5c1f;
  --indigo:        #7c9ac9;
  --line:          #262c3b;
  --line-faint:    #181d29;
  --panel-bg:      #10131dfa;
  --sans: "Inter", system-ui, sans-serif;
  --display: "Space Grotesk", system-ui, sans-serif;
  --mono: "IBM Plex Mono", Consolas, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body { height: 100dvh; }        /* dynamic viewport: tracks the phone's address bar */

body {
  background:
    radial-gradient(ellipse 130% 75% at 50% -12%, #151d33 0%, transparent 55%),
    radial-gradient(ellipse 85% 55% at 88% 112%, #1c1324 0%, transparent 60%),
    var(--obsidian);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mono { font-family: var(--mono); font-size: 0.82em; letter-spacing: 0.03em; }

/* ============ motion ============ */
@keyframes glowpulse {
  0%, 100% { box-shadow: 0 0 8px rgba(201,162,39,0.35); }
  50%      { box-shadow: 0 0 20px rgba(232,196,85,0.7); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes twinkle { 0%, 100% { opacity: 0.04; } 50% { opacity: 0.45; } }
@keyframes condense { from { transform: scale(0); } to { transform: scale(1); } }
@keyframes flow { to { stroke-dashoffset: -24; } }
@keyframes reveal-up {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0);   opacity: 1; }
}

/* ============ masthead ============ */
#masthead {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 22px 10px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(201,162,39,0.05), transparent);
  position: relative;
}
#masthead::after {
  content: "";
  position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 25%, var(--gold) 50%, var(--gold-dim) 75%, transparent);
  opacity: 0.5;
  pointer-events: none;
}

/* pure-geometry sigil: ring, orbit, nucleus */
.sigil {
  position: relative;
  width: 34px; height: 34px;
  border: 1px solid rgba(201,162,39,0.55);
  border-radius: 50%;
  animation: glowpulse 6s ease-in-out infinite;
}
.sigil::before {
  content: "";
  position: absolute; inset: -5px;
  border: 1px dashed rgba(201,162,39,0.3);
  border-radius: 50%;
  animation: spin 50s linear infinite;
}
.sigil::after {
  content: "";
  position: absolute; left: 50%; top: 50%;
  width: 6px; height: 6px; margin: -3px 0 0 -3px;
  background: var(--gold-bright);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gold-bright);
}

#masthead h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: 0.34em;
  color: var(--gold-bright);
}
.tagline {
  color: var(--paper-dim);
  font-size: 12px;
  letter-spacing: 0.06em;
  margin-top: 1px;
}

#tx-link {
  margin-left: auto;
  font-family: var(--display);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 7px 14px;
  transition: all 0.18s;
}
#tx-link:hover { color: var(--gold-bright); box-shadow: 0 0 12px rgba(201,162,39,0.22); }
#bl-link, #pn-link, #cx-link, #tr-link {
  margin-left: 8px;
  font-family: var(--display);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 7px 14px;
  transition: all 0.18s;
}
#bl-link:hover, #pn-link:hover, #cx-link:hover { color: var(--gold-bright); box-shadow: 0 0 12px rgba(201,162,39,0.22); }

.masthead-readout { margin-left: 16px; text-align: right; }
.readout-line { font-family: var(--display); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
.readout-line.mono { font-family: var(--mono); color: var(--paper-dim); font-size: 11px; margin-top: 3px; text-transform: none; }

/* ============ single command bar (main app) ============ */
#bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(201,162,39,0.05), transparent);
  position: relative;
  z-index: 30;
  flex-wrap: nowrap;
}
#bar::after {
  content: "";
  position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim) 25%, var(--gold) 50%, var(--gold-dim) 75%, transparent);
  opacity: 0.5;
  pointer-events: none;
}
#bar-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--gold-bright);
  margin-right: 4px;
}
.sigil.mini { width: 24px; height: 24px; }
.sigil.mini::before { inset: -4px; }
.sigil.mini::after { width: 5px; height: 5px; margin: -2.5px 0 0 -2.5px; }
#bar .masthead-readout { margin-left: 4px; }
#bar #search { flex: 0 1 220px; }
#bar #tx-link, #bar #bl-link, #bar #pn-link, #bar #cx-link, #bar #tr-link { margin-left: 0; padding: 6px 10px; font-size: 10.5px; }
#bar .sigil.mini { cursor: pointer; }

/* ============ the portal (welcome overlay) ============ */
#welcome {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(7, 9, 15, 0.82);
  backdrop-filter: blur(7px);
  display: flex; align-items: center; justify-content: center;
  padding: 18px;
  overflow-y: auto;
}
#welcome-card {
  width: min(680px, 96vw);
  background: var(--obsidian-2);
  border: 1px solid var(--gold-dim);
  border-radius: 10px;
  padding: 30px 30px 22px;
  text-align: center;
  box-shadow: 0 30px 90px rgba(0,0,0,.7), 0 0 60px rgba(201,162,39,.08);
  animation: reveal-up 0.35s ease-out;
}
.w-sigil {
  width: 44px; height: 44px; margin: 0 auto 14px;
  border: 1px solid rgba(201,162,39,0.6); border-radius: 50%;
  position: relative; animation: glowpulse 5s ease-in-out infinite;
}
.w-sigil::after {
  content: ""; position: absolute; left: 50%; top: 50%;
  width: 8px; height: 8px; margin: -4px 0 0 -4px;
  background: var(--gold-bright); border-radius: 50%;
  box-shadow: 0 0 12px var(--gold-bright);
}
#welcome-card h2 {
  font-family: var(--display); font-weight: 700; font-size: 20px;
  letter-spacing: 0.34em; color: var(--gold-bright); margin-bottom: 8px;
}
.w-sub { font-size: 13.5px; line-height: 1.6; color: var(--paper-dim); margin-bottom: 20px; }
.w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.w-door {
  display: flex; flex-direction: column; gap: 4px; align-items: flex-start; text-align: left;
  background: var(--obsidian-3); border: 1px solid var(--line); border-radius: 7px;
  padding: 13px 15px; cursor: pointer; text-decoration: none;
  color: var(--paper); font-family: var(--sans); transition: all 0.16s;
}
.w-door:hover { border-color: var(--gold); background: rgba(201,162,39,0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.w-door.wide { grid-column: 1 / -1; }
.w-door .w-ic { font-size: 19px; }
.w-door b { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--gold-bright); letter-spacing: 0.03em; }
.w-door span:last-child { font-size: 11.5px; line-height: 1.5; color: var(--paper-dim); }
.w-foot { margin-top: 16px; font-family: var(--mono); font-size: 10px; color: #59617c; }
.w-foot b { color: var(--gold); font-weight: 400; }
@media (max-width: 700px) {
  .w-grid { grid-template-columns: 1fr; }
  #welcome-card { padding: 22px 18px 16px; }
  #welcome-card h2 { font-size: 16px; letter-spacing: 0.24em; }
}

/* ============ collapsible drawer ============ */
#drawer {
  position: fixed;
  left: 0; top: 48px; bottom: 0;
  width: 300px;
  max-width: 85vw;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border-right: 1px solid var(--line);
  box-shadow: 24px 0 60px rgba(0,0,0,0.5);
  padding: 18px 16px 30px;
  overflow-y: auto;
  z-index: 25;
  transform: translateX(-104%);
  transition: transform 0.3s cubic-bezier(.22,1,.36,1);
}
#drawer.open { transform: translateX(0); }
.d-section { margin-bottom: 20px; }
.d-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 9px;
}
.d-row { display: flex; flex-wrap: wrap; gap: 6px; }
.d-row select { max-width: 100%; flex: 1 1 120px; }
#drawer #theme-chips { display: flex; flex-direction: column; gap: 6px; padding: 0; border: none; }
#drawer .chip { justify-content: flex-start; }
.d-legend { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--paper-dim); }
.d-legend .legend-item { display: inline-flex; align-items: center; gap: 7px; line-height: 1.5; }

/* atlas time-play + narrative tours */
#play-btn {
  position: absolute;
  left: 10px; bottom: 46px;
  z-index: 6;
  box-shadow: 0 4px 18px rgba(0,0,0,0.5), 0 0 14px rgba(201,162,39,0.15);
}
#tours-menu {
  position: absolute;
  right: 12px; top: 8px;
  z-index: 40;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 10px;
  width: 340px;
  max-width: 90vw;
  box-shadow: 0 14px 44px rgba(0,0,0,0.6);
}
.tour-item {
  padding: 9px 10px;
  border-left: 2px solid var(--gold-dim);
  background: rgba(255,255,255,0.02);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tour-item:hover { background: rgba(201,162,39,0.1); border-left-color: var(--gold); }
.tour-item .tt { font-family: var(--display); font-weight: 600; font-size: 12.5px; color: var(--gold-bright); }
.tour-item .tb { font-size: 11.5px; color: var(--paper-dim); margin-top: 2px; line-height: 1.45; }
#tour-card {
  position: absolute;
  left: 50%; bottom: 52px;
  transform: translateX(-50%);
  z-index: 35;
  width: 560px; max-width: 92%;
  background: var(--panel-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 14px 16px 12px;
  box-shadow: 0 16px 50px rgba(0,0,0,0.65), 0 0 24px rgba(201,162,39,0.1);
  animation: reveal-up 0.25s ease-out;
}
#tour-note { font-size: 14px; line-height: 1.6; color: var(--paper); margin: 6px 0 10px; }
#tour-nav { display: flex; align-items: center; gap: 8px; }
#tour-step { font-size: 10.5px; color: #59617c; margin: 0 auto 0 4px; }
.map-year-big {
  font-family: "IBM Plex Mono", monospace;
  fill: var(--gold-bright);
  font-size: 34px;
  letter-spacing: 0.06em;
  paint-order: stroke; stroke: rgba(10,12,18,0.85); stroke-width: 6px;
}
.ignite { pointer-events: none; }
#play-speed { position: absolute; left: 150px; bottom: 46px; z-index: 6; }
#play-era {
  position: absolute; left: 10px; bottom: 88px; z-index: 6;
  font-family: var(--display); font-weight: 700;
  font-size: 21px; letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--gold-bright);
  text-shadow: 0 0 18px rgba(201,162,39,0.5), 0 2px 4px rgba(0,0,0,0.8);
  pointer-events: none;
}
#play-era.flash { animation: era-flash 0.9s ease-out; }
@keyframes era-flash {
  0% { transform: scale(1.5); opacity: 0; letter-spacing: 0.5em; }
  100% { transform: scale(1); opacity: 1; letter-spacing: 0.24em; }
}
#play-feed {
  position: absolute; left: 10px; top: 46px; z-index: 6;
  width: 320px; max-width: 44vw;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
.feed-item {
  background: rgba(10,12,18,0.72);
  border-left: 3px solid var(--c, var(--gold));
  border-radius: 0 3px 3px 0;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--paper);
  animation: reveal-up 0.3s ease-out;
}
.feed-item .fy { font-family: var(--mono); font-size: 9.5px; color: var(--gold-bright); display: block; }
.feed-item:nth-child(n+4) { opacity: 0.55; }
.feed-item:nth-child(n+6) { opacity: 0.28; }
.wheel-hand { stroke: var(--gold-bright); stroke-width: 1.6; filter: drop-shadow(0 0 8px rgba(232,196,85,0.8)); pointer-events: none; }
.wheel-hand-tip { fill: var(--gold-bright); filter: drop-shadow(0 0 10px rgba(232,196,85,0.9)); pointer-events: none; }
.wheel-year-big {
  font-family: "IBM Plex Mono", monospace;
  fill: var(--gold-bright); font-size: 22px;
  paint-order: stroke; stroke: rgba(10,12,18,0.85); stroke-width: 5px;
}

/* floating status chip inside the chart */
#status {
  position: absolute;
  right: 10px; bottom: 8px;
  font-size: 10.5px;
  color: #59617c;
  background: rgba(10,12,18,0.55);
  border: 1px solid var(--line-faint);
  border-radius: 3px;
  padding: 3px 9px;
  pointer-events: none;
  z-index: 5;
}

/* ============ toolbar ============ */
#toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 22px;
  border-bottom: 1px solid var(--line-faint);
}

#view-switch {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
.view-btn {
  background: var(--obsidian-3);
  border: none;
  border-right: 1px solid var(--line);
  color: var(--paper-dim);
  font-family: var(--display);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.18s;
}
.view-btn:last-child { border-right: none; }
.view-btn:hover { color: var(--gold-bright); }
.view-btn.active {
  background: rgba(201,162,39,0.15);
  color: var(--gold-bright);
  box-shadow: inset 0 -2px 0 var(--gold);
}

#search {
  flex: 0 1 280px;
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
#search:focus { border-color: var(--gold-dim); box-shadow: 0 0 12px rgba(201,162,39,0.2); }
#search::placeholder { color: #5c637a; }

select {
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper);
  font-family: var(--sans);
  font-size: 12.5px;
  padding: 8px 8px;
  border-radius: 4px;
  max-width: 170px;
  transition: border-color 0.18s;
}
select:hover, select:focus { border-color: var(--gold-dim); outline: none; }

.toolbar-spacer { flex: 1; }

.tool-btn {
  background: var(--obsidian-3);
  border: 1px solid var(--line);
  color: var(--paper-dim);
  font-family: var(--display);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  min-width: 34px;
  transition: all 0.18s;
}
.tool-btn:hover {
  border-color: var(--gold-dim);
  color: var(--gold-bright);
  box-shadow: 0 0 10px rgba(201,162,39,0.16);
}
.tool-btn.accent { border-color: var(--gold-dim); color: var(--gold); }
.tool-btn.wide { padding: 8px 14px; }

/* ============ theme chips ============ */
#theme-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 22px 9px;
  border-bottom: 1px solid var(--line-faint);
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 11.5px;
  letter-spacing: 0.02em;
  color: var(--paper-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 4px 11px;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
}
.chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--c, var(--gold));
  box-shadow: 0 0 7px var(--c, var(--gold));
}
.chip:hover { border-color: var(--gold-dim); color: var(--paper); }
.chip.active {
  border-color: var(--c, var(--gold));
  color: var(--paper);
  background: color-mix(in srgb, var(--c, var(--gold)) 14%, transparent);
}
.chip.dimmed { opacity: 0.35; }

/* ============ stage ============ */
#stage { flex: 1; display: flex; min-height: 0; position: relative; }

#chart-wrap { flex: 1; position: relative; min-width: 0; }

#chart {
  width: 100%; height: 100%; display: block;
  cursor: crosshair;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
#chart.panning { cursor: grabbing; }

/* --- SVG vocabulary --- */
.era-band { cursor: pointer; transition: filter 0.18s; }
.era-band:hover { filter: brightness(1.8); }
.era-band-label {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-weight: 500;
  fill: #8f9ab5;
  letter-spacing: 0.12em;
  pointer-events: none;
  text-transform: uppercase;
}
.era-boundary { stroke: var(--line-faint); stroke-width: 1; }
.axis-tick-label { font-family: "IBM Plex Mono", monospace; fill: #66708c; font-size: 10px; }
.axis-line { stroke: var(--line); }
.meridian { stroke: var(--gold-dim); stroke-width: 1; stroke-dasharray: 3 4; }
.meridian-label { font-family: "Space Grotesk", sans-serif; fill: var(--gold-dim); font-size: 9px; letter-spacing: 0.16em; }
.lane-label {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-weight: 500;
  fill: #4d5670;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  pointer-events: none;
}
.lane-line { stroke: var(--line-faint); stroke-dasharray: 1 5; }

.evt { cursor: pointer; }
.evt .node-core { transition: r 0.16s cubic-bezier(.34,1.56,.64,1); }
.evt-label {
  font-family: "Inter", system-ui, sans-serif;
  fill: var(--paper-dim);
  font-size: 10.5px;
  letter-spacing: 0.01em;
  pointer-events: none;
  paint-order: stroke;
  stroke: rgba(10,12,18,0.88);
  stroke-width: 3px;
}
.evt-label.major { fill: var(--paper); font-size: 11.5px; font-weight: 500; }

.enter .evt {
  transform-box: fill-box;
  transform-origin: center;
  animation: condense 0.5s cubic-bezier(.34,1.56,.64,1) both;
}

/* the standing web of relations */
.web-line {
  stroke: var(--gold);
  stroke-width: 0.6;
  opacity: 0.10;
  pointer-events: none;
}
/* the ignited thread */
.constellation {
  stroke: var(--gold-bright);
  stroke-width: 1;
  stroke-dasharray: 3 5;
  opacity: 0.8;
  pointer-events: none;
  animation: flow 1.6s linear infinite;
}

.star { fill: #b8c4e8; pointer-events: none; }
.star.twinkle { animation-name: twinkle; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }

.time-cursor { stroke: rgba(232,196,85,0.3); stroke-width: 1; pointer-events: none; }
.time-cursor-label {
  font-family: "IBM Plex Mono", monospace;
  fill: var(--gold-bright); font-size: 10px;
  pointer-events: none;
  paint-order: stroke; stroke: rgba(10,12,18,0.9); stroke-width: 3px;
}

.ov-bg { fill: var(--obsidian-2); stroke: var(--line-faint); }
.ov-brush {
  fill: rgba(201,162,39,0.15);
  stroke: var(--gold-dim);
  stroke-width: 1;
  cursor: ew-resize;
  transition: fill 0.18s;
}
.ov-brush:hover { fill: rgba(201,162,39,0.26); }
.ov-dot { pointer-events: none; }
.ov-hit { fill: transparent; cursor: pointer; }

/* atlas */

  <script>
/* ============================================================
   ARCHIVUS — THE TRIAL
   The archive turned examiner. Every round draws ten fresh
   questions straight from the 548 records, so no two trials
   are alike, and every answer links back to the record so a
   wrong guess becomes a lesson. Four ordeals:
     · PRECEDENCE — which came first?
     · THE DATE   — when did it happen?
     · THE THREAD — which record is truly connected?
     · THE HORIZON — which of these has not happened yet?
   ============================================================ */
(function () {
  "use strict";
  const ALL = (window.ARCHIVUS_EVENTS || []).filter(e => Number.isFinite(e.startYear));
  const PAST = ALL.filter(e => !e.future && (e.importance || 0) >= 6);
  const BIG = ALL.filter(e => !e.future && (e.importance || 0) >= 7);
  const FUT = ALL.filter(e => e.future);
  const BY_ID = Object.fromEntries(ALL.map(e => [e.id, e]));
  const fmtY = y => y < 0 ? Math.abs(y).toLocaleString() + " BCE" : y + " CE";
  const rnd = a => a[Math.floor(Math.random() * a.length)];
  const shuffle = a => { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
  const link = e => '<a href="index.html#e=' + e.id + '&v=chronicle">' + e.title + '</a>';

  /* ---------- question forges ---------- */
  function qPrecedence() {
    let a, b, guard = 0;
    do {
      a = rnd(BIG); b = rnd(BIG);
      guard++;
    } while (guard < 60 && (a.id === b.id || Math.abs(a.startYear - b.startYear) < Math.max(60, Math.abs(Math.min(a.startYear, b.startYear)) * 0.05)));
    const first = a.startYear <= b.startYear ? a : b;
    return {
      kicker: "ORDEAL OF PRECEDENCE",
      q: "Which came first?",
      opts: shuffle([a, b]).map(e => ({ label: e.title, e, right: e === first })),
      verdict: ok => (ok ? "Correct. " : "Not so. ") + link(first) + " (" + fmtY(first.startYear) + ") precedes " +
        link(first === a ? b : a) + " (" + fmtY(first === a ? b.startYear : a.startYear) + ")." +
        (Math.abs(a.startYear - b.startYear) > 1000 ? " A gap of " + Math.abs(a.startYear - b.startYear).toLocaleString() + " years." : "")
    };
  }
  function qDate() {
    const e = rnd(BIG);
    const y = e.startYear;
    const age = Math.abs(2026 - y);
    const spread = Math.max(30, Math.round(age * 0.22));
    const decoys = new Set();
    let guard = 0;
    while (decoys.size < 3 && guard++ < 60) {
      const sign = Math.random() < 0.5 ? -1 : 1;
      const d = y + sign * Math.round(spread * (0.5 + Math.random()));
      if (Math.abs(d - y) >= Math.max(25, spread * 0.35) && d < 2140) decoys.add(d);
    }
    const opts = shuffle([y, ...decoys]).map(v => ({ label: (e.approximate ? "c. " : "") + fmtY(v), right: v === y }));
    return {
      kicker: "ORDEAL OF THE DATE",
      q: "When: " + e.title + "?",
      opts,
      verdict: ok => (ok ? "Correct — " : "The record says ") + link(e) + " · " + (e.approximate ? "c. " : "") + fmtY(y) +
        ". " + (e.desc || "").split(". ")[0] + "."
    };
  }
  function qThread() {
    const withRel = BIG.filter(e => (e.related || []).some(r => BY_ID[r]));
    const e = rnd(withRel);
    const truth = BY_ID[rnd(e.related.filter(r => BY_ID[r]))];
    const decoys = [];
    let guard = 0;
    while (decoys.length < 3 && guard++ < 80) {
      const d = rnd(PAST);
      if (d.id !== e.id && d.id !== truth.id &&
          !(e.related || []).includes(d.id) && !(d.related || []).includes(e.id) &&
          !decoys.some(x => x.id === d.id)) decoys.push(d);
    }
    return {
      kicker: "ORDEAL OF THE THREAD",
      q: "Which record does the archive bind directly to “" + e.title + "”?",
      opts: shuffle([truth, ...decoys]).map(x => ({ label: x.title, right: x.id === truth.id })),
      verdict: ok => (ok ? "Woven true. " : "The true thread runs to " + link(truth) + ". ") +
        link(e) + " (" + fmtY(e.startYear) + ") ⟷ " + link(truth) + " (" + fmtY(truth.startYear) + ")."
    };
  }
  function qHorizon() {
    const f = rnd(FUT);
    const decoys = [];
    let guard = 0;
    while (decoys.length < 3 && guard++ < 60) {
      const d = rnd(BIG.filter(e => e.startYear > 1400));
      if (!decoys.some(x => x.id === d.id)) decoys.push(d);
    }
    return {
      kicker: "ORDEAL OF THE HORIZON",
      q: "One of these has NOT happened yet. Which?",
      opts: shuffle([f, ...decoys]).map(x => ({ label: x.title, right: x.id === f.id })),
      verdict: ok => (ok ? "Correct — " : "It is ") + link(f) + ", anticipated " + fmtY(f.startYear) +
        ". " + (f.desc || "").split(". ")[0] + "."
    };
  }

  /* ---------- the trial ---------- */
  const FORGES = [qPrecedence, qDate, qThread, qHorizon];
  let round = [], idx = 0, score = 0, streak = 0, best = 0;

  function newTrial() {
    round = [];
    /* a balanced draw: 3 precedence, 3 dates, 2 threads, 2 horizon — shuffled */
    [qPrecedence, qPrecedence, qPrecedence, qDate, qDate, qDate, qThread, qThread, qHorizon, qHorizon]
      .forEach(f => round.push(f()));
    round = shuffle(round);
    idx = 0; score = 0; streak = 0; best = 0;
    document.getElementById("tr-final").style.display = "none";
    show();
  }

  function show() {
    const Q = round[idx];
    document.getElementById("tr-n").textContent = idx + 1;
    document.getElementById("tr-score").textContent = score;
    document.getElementById("tr-streak").textContent = streak >= 2 ? "🔥 streak " + streak : "";
    document.getElementById("tr-fill").style.width = (idx / 10 * 100) + "%";
    document.getElementById("tr-kicker").textContent = Q.kicker;
    document.getElementById("tr-q").textContent = Q.q;
    const box = document.getElementById("tr-opts");
    box.innerHTML = "";
    const v = document.getElementById("tr-verdict");
    v.style.display = "none"; v.innerHTML = "";
    document.getElementById("tr-next").style.display = "none";
    document.getElementById("tr-kicker").style.display = "";
    document.getElementById("tr-q").style.display = "";
    box.style.display = "";
    Q.opts.forEach(o => {
      const b = document.createElement("button");
      b.className = "tr-opt";
      b.textContent = o.label;
      b.addEventListener("click", () => answer(o, b, Q));
      box.appendChild(b);
    });
  }

  function answer(o, btn, Q) {
    const btns = [...document.querySelectorAll(".tr-opt")];
    btns.forEach(b => b.disabled = true);
    btns.forEach((b, i) => {
      const opt = Q.opts[i];
      if (opt.right) b.classList.add("right");
      else if (b === btn) b.classList.add("wrong");
      else b.classList.add("faded");
    });
    if (o.right) { score++; streak++; best = Math.max(best, streak); } else streak = 0;
    document.getElementById("tr-score").textContent = score;
    const v = document.getElementById("tr-verdict");
    v.innerHTML = Q.verdict(o.right);
    v.style.display = "block";
    const nx = document.getElementById("tr-next");
    nx.textContent = idx === 9 ? "Hear the judgement ▶" : "Next question ▶";
    nx.style.display = "block";
    nx.focus();
  }

  function judge() {
    document.getElementById("tr-fill").style.width = "100%";
    ["tr-kicker", "tr-q"].forEach(i2 => document.getElementById(i2).style.display = "none");
    document.getElementById("tr-opts").style.display = "none";
    document.getElementById("tr-verdict").style.display = "none";
    document.getElementById("tr-next").style.display = "none";
    const ranks = [
      [10, "ORACLE", "Flawless. The archive suspects you wrote it."],
      [8, "ARCHIVIST", "You walk the stacks like you shelved them yourself."],
      [6, "SCRIBE", "A steady hand. The deep past still hides a few things from you."],
      [4, "INITIATE", "The door is open; the library is long. Take a tour."],
      [0, "WANDERER", "History happened to other people, apparently. The Codex awaits."]
    ];
    const [, rank, sub] = ranks.find(([min]) => score >= min);
    document.getElementById("tr-rank").textContent = rank;
    document.getElementById("tr-sub").innerHTML = "You answered <b>" + score + " of 10</b>" +
      (best >= 3 ? " with a streak of " + best : "") +
      ".<br>" + sub + "<br><span style='font-size:12px;color:#59617c'>Every trial draws fresh questions from all 548 records.</span>";
    document.getElementById("tr-final").style.display = "block";
  }

  document.getElementById("tr-next").addEventListener("click", () => {
    if (idx === 9) return judge();
    idx++; show();
  });
  document.getElementById("tr-again").addEventListener("click", newTrial);
  newTrial();
})();

</script>
